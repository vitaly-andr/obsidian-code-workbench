name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Release notes from CHANGELOG
        run: |
          # Extract this tag's section from CHANGELOG.md — everything under "## [<tag>]" up to the
          # next "## [" heading — so the GitHub release describes the actual change, not a placeholder.
          awk -v ver="$GITHUB_REF_NAME" '
            index($0, "## [" ver "]") == 1 { grab = 1; next }
            grab && index($0, "## [") == 1 { exit }
            grab { print }
          ' CHANGELOG.md > release-notes.md
          # Fall back to a one-liner if the tag has no CHANGELOG section.
          if [ ! -s release-notes.md ]; then
            printf 'Release %s. Desktop only.\n' "$GITHUB_REF_NAME" > release-notes.md
          fi
          echo "----- release notes -----"; cat release-notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" main.js manifest.json styles.css \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md
